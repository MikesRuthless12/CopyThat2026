# cargo-deny — license, dependency, and supply-chain gate.
#
# Phase 0 contract: every transitive dependency must use a permissive license.
# This file is what makes "$0 to build, commercially shippable" enforceable as
# the dependency tree evolves. CI runs `cargo deny check` and fails the build
# on any violation.
#
# Reference: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
all-features = true

[output]
feature-depth = 1

# ----- Licenses ---------------------------------------------------------------
#
# Allowlist only. Any license not in `allow` causes a hard failure. The list
# matches the Phase 0 cost-policy: GPL / AGPL / SSPL / BUSL / CC-BY-NC and
# any other non-permissive license is rejected.
[licenses]
version = 2
confidence-threshold = 0.92
# Forward-compatible: keep entries even when no current dep uses them, so a
# later phase pulling such a dep does not surprise us.
unused-allowed-license = "allow"
# Skip license checks for our own workspace crates (those marked
# `publish = false`). They carry the proprietary
# `LicenseRef-AllRightsReserved` identifier, which is intentionally not
# in the allowlist below — that allowlist governs *third-party*
# dependencies only.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",            # Boost Software License 1.0 — permissive, OSI-approved,
                          # compatible with commercial distribution. Pulled in by
                          # `xxhash-rust` (added Phase 3 for xxHash3 verification).
    "ISC",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",            # file-scope copyleft only — acceptable for shipping
                          # a closed-source app that does not modify MPL files.
    "CDLA-Permissive-2.0", # Community Data License Agreement — Permissive 2.0.
                          # Linux-Foundation-authored, ODI-conformant permissive
                          # data license used by some data-carrying crates (e.g.
                          # `webpki-roots` / TLS root trust bundles pulled in
                          # transitively through Tauri's HTTP stack). Allows
                          # redistribution, modification, and closed-source
                          # use. https://cdla.dev/permissive-2-0/
]

# Per-crate exceptions — none for Phase 0; add here only with documented reason.
exceptions = []

# ----- Bans -------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards         = "deny"
highlight         = "all"

# Crates we will never accept, regardless of license:
deny = []

# Skip duplicate-version warnings for crates where conflicts are inherited from
# the ecosystem and out of our control. Populate as needed; empty in Phase 0.
skip = []
skip-tree = []

# ----- Sources ----------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []

# ----- Advisories -------------------------------------------------------------
#
# All entries below are "unmaintained" advisories (NOT vulnerabilities),
# inherited transitively from Tauri 2.x's Linux toolchain. We do not import
# any of these crates directly and cannot evict them from the tree until the
# upstream maintainer migrates. Re-audit at every Tauri minor bump and remove
# entries whose root crate has been replaced. New unmaintained advisories
# encountered later get added here with the same one-line provenance comment.
#
# Phase 36 also adds a single *vulnerability* exception for
# RUSTSEC-2023-0071 (Marvin Attack on the `rsa` crate, no constant-time
# upstream patch yet). Inherited transitively from `age` (Phase 35
# destination encryption — RSA only when the user picks an RSA SSH key
# recipient) and `reqsign` (Phase 32 cloud sign — only used for OAuth
# token signatures). The Marvin Attack requires the attacker to observe
# RSA operation timing across many requests over the network. CopyThat
# is a local file-copying tool: it does not expose RSA timing to a
# remote attacker, and the operations that do touch RSA (decrypting an
# age payload with a user-supplied SSH key; signing a cloud-OAuth
# request) run on the user's own machine. The official `rsa` crate
# advisory text states the same: "local use on a non-compromised
# computer is fine". Re-audit and remove this entry the moment the
# `rsa` crate ships a constant-time release.
[advisories]
version = 2
yanked  = "deny"
ignore = [
    # Phase 35 / 32 — Marvin Attack on `rsa` crate; see provenance
    # comment above. Local file-copying tool, no remote-observable
    # RSA timing.
    "RUSTSEC-2023-0071",
    # Phase 31 — `nix 0.19` getgrouplist OOB. Inherited transitively
    # from `battery 0.7` (Linux power source enumeration). The bug
    # only triggers on Linux when /etc/group lists >16 groups for the
    # current user — exploitation requires root-level edit access to
    # /etc/group, which is the same trust boundary as the file copy
    # operation itself. Re-audit when `battery` upgrades nix or when
    # we replace the crate with a direct sysfs reader.
    "RUSTSEC-2021-0119",
    # Phase 33 — `registry 1.3` archived by upstream. Inherited
    # transitively through `winfsp_wrs_sys` build script (Windows
    # mount-as-filesystem). No vulnerability, just maintenance signal.
    # `windows-registry` is the proposed replacement; tracked for the
    # winfsp_wrs maintainer.
    "RUSTSEC-2025-0026",
    # Phase 33 — `fuser 0.15` uninitialized-memory read in
    # `request::header_unchecked`. Inherited transitively from the
    # FUSE mount-as-filesystem path on Linux. Not exploitable in our
    # threat model: the read is from kernel-supplied bytes inside the
    # FUSE message header, which the kernel zero-fills before delivery
    # — the unsoundness materializes only in narrow handcrafted-syscall
    # edge cases. Re-audit when fuser ships 0.16+.
    "RUSTSEC-2021-0154",
    # Phase 31 — `mach 0.3.2` archived. Inherited transitively through
    # `battery 0.7` on macOS for IOPMPowerSource lookups. No
    # vulnerability; maintenance signal only. Replacement candidate is
    # `mach2`, blocked on a `battery` crate upstream bump.
    "RUSTSEC-2020-0168",
    # Phase 33 — `async-std` discontinued. Inherited transitively
    # through `fuser`'s default-feature stack on Linux. No
    # vulnerability; the runtime swap to `tokio` requires a fuser
    # upstream change.
    "RUSTSEC-2025-0052",
    # gtk-rs GTK3 binding family — Tauri 2.x Linux WebView (atk, gdk, gdk-sys,
    # gdkx11, gdkx11-sys, gdk-pixbuf, gdk-pixbuf-sys, gdkwayland-sys, gtk,
    # gtk-sys, gtk3-macros). Will clear when Tauri migrates Linux to GTK4.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # proc-macro-error — superseded by proc-macro-error2; pulled in transitively.
    "RUSTSEC-2024-0370",
    # fxhash — superseded by rustc-hash 2.x; pulled in transitively.
    "RUSTSEC-2025-0057",
    # unic-* (unic-char-property, unic-char-range, unic-common, unic-ucd-ident,
    # unic-ucd-version) — superseded by ICU4X icu_* crates; pulled transitively.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
]
